# ---------- ОСНОВНЫЕ НАСТРОЙКИ ----------
music_directory    "/mnt/hdd_1tb/Music"
playlist_directory "/home/mintadmin/.mpd/playlists"
db_file            "/home/mintadmin/.mpd/tag_cache"
log_file           "/var/log/mpd/mpd.log"
pid_file           "/run/mpd/pid"
state_file         "/home/mintadmin/.mpd/mpdstate"

# ---------- СЕТЕВЫЕ НАСТРОЙКИ (чтобы принимать подключения из VLAN) ----------
bind_to_address    "0.0.0.0"
port               "6600"

# ---------- НАСТРОЙКА ЗВУКА (ALSA) ----------
# Это основной вывод — прямо в твои колонки, подключенные к серверу
audio_output {
    type            "alsa"
    name            "My ALSA Device"
    device          "hw:0,0"
    mixer_type      "software"
}

# ---------- ДОПОЛНИТЕЛЬНО: HTTP-стрим для прослушивания через браузер/плеер ----------
# Это опционально, но прикольно: можно слушать музыку с сервера в любой точке сети
audio_output {
    type            "httpd"
    name            "My HTTP Stream"
    encoder         "vorbis"            # или "lame" для mp3
    port            "8000"
    bitrate         "128"
    format          "44100:16:2"
    max_clients     "5"
}

# ---------- ПРАВА ДОСТУПА ----------
user               "mintadmin"
